name: Bug report
description: Report a reproducible problem in PortUI.
title: "[bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the manifest and command shape if relevant.
      placeholder: |
        1. Run ...
        2. Select ...
        3. Observe ...
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Host OS
      options:
        - Linux
        - macOS
        - Windows
        - Multiple
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

