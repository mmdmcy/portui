name: Feature request
description: Propose an improvement to PortUI.
title: "[feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow gap are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the smallest useful change.
    validations:
      required: true
  - type: textarea
    id: portability
    attributes:
      label: Cross-platform impact
      description: Note whether this affects Linux, macOS, Windows, or manifest compatibility.

